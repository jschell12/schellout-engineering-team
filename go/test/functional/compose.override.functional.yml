# Functional-test compose override (T7.2). Layered on top of
# docker-compose.go.yml by the test harness (main_test.go):
#
#   docker compose -p swe-af-go-functional \
#     -f docker-compose.go.yml -f go/test/functional/compose.override.functional.yml up
#
# It remaps only the HOST port bindings (container ports and all
# service-to-service URLs are untouched) so the functional stack can run
# alongside anything already occupying 8080/8003/8004 on the host — e.g. a
# host control-plane or the Python compose stack. `!override` replaces the
# base list instead of appending to it (Compose v2.24+).
#
# Keep in sync with the defaults in main_test.go (cpHostPort/plannerHostPort/
# fastHostPort = 18080/18003/18004).
services:
  control-plane:
    ports: !override
      - "18080:8080"
  swe-agent:
    ports: !override
      - "18003:8003"
  swe-fast:
    ports: !override
      - "18004:8004"
